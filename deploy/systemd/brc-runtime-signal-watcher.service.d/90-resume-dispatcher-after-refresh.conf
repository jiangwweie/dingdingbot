[Service]
# Dispatcher consumes PG Action-Time Ticket identity only. The watcher tick may
# run ticket-bound preflight checks and then consume PG SubmitModeDecision; real
# submit is possible only when PG current policy/safety/protection/gateway and
# this deployment submit policy are all armed.
ExecStartPost=/home/ubuntu/brc-deploy/venvs/brc-bnb-prelive-20260601/bin/python scripts/runtime_signal_watcher_resume_dispatcher.py \
  --identity-source pg_ticket \
  --api-base http://127.0.0.1:18080 \
  --label tokyo-runtime-signal-watcher \
  --execute-preflight \
  --execute-operation-layer-submit \
  --operation-layer-submit-mode from_submit_mode_decision \
  --production-submit-execution-policy armed
