[Service]
# Dispatcher consumes PG Action-Time Ticket identity only. The watcher tick may
# run ticket-bound preflight checks, but real submit/finalize are intentionally
# not armed from this broad periodic post-step.
ExecStartPost=/home/ubuntu/brc-deploy/venvs/brc-bnb-prelive-20260601/bin/python scripts/runtime_signal_watcher_resume_dispatcher.py \
  --identity-source pg_ticket \
  --api-base http://127.0.0.1:18080 \
  --label tokyo-runtime-signal-watcher \
  --execute-preflight
