[Service]
# Keep the watcher autonomous after a bounded fresh signal appears. This path
# still requires official FinalGate and the official Operation Layer endpoint.
ExecStartPost=/home/ubuntu/brc-deploy/venvs/brc-bnb-prelive-20260601/bin/python scripts/runtime_signal_watcher_resume_dispatcher.py \
  --resume-pack-json /home/ubuntu/brc-deploy/reports/runtime-signal-watcher/post-signal-resume-pack.json \
  --output-json /home/ubuntu/brc-deploy/reports/runtime-signal-watcher/resume-dispatch-packet.json \
  --api-base http://127.0.0.1:18080 \
  --label tokyo-runtime-signal-watcher \
  --selected-strategy-group-id ${BRC_SELECTED_STRATEGY_GROUP_ID} \
  --execute-preflight \
  --execute-operation-layer-submit \
  --execute-post-submit-finalize
