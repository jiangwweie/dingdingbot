<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980">
  <rect width="1440" height="980" fill="#f6f7f9"/>
  <rect x="40" y="32" width="1360" height="70" rx="6" fill="#ffffff" stroke="#d1d5db"/>
  <text x="70" y="76" fill="#111827" font-family="Arial" font-size="22" font-weight="700">Runtime Control</text>
  <text x="1040" y="76" fill="#991b1b" font-family="Arial" font-size="14" font-weight="700">State changes require action card + Owner confirmation + audit</text>

  <rect x="40" y="132" width="1360" height="150" rx="6" fill="#ffffff" stroke="#d1d5db"/>
  <text x="70" y="172" fill="#111827" font-family="Arial" font-size="18" font-weight="700">Current Runtime State</text>
  <g font-family="Arial" font-size="14">
    <rect x="70" y="200" width="150" height="44" rx="22" fill="#eff6ff" stroke="#60a5fa"/>
    <text x="112" y="228" fill="#1e3a8a" font-weight="700">observe</text>
    <rect x="240" y="200" width="150" height="44" rx="22" fill="#f3f4f6" stroke="#d1d5db"/>
    <text x="282" y="228" fill="#374151">monitor</text>
    <rect x="410" y="200" width="170" height="44" rx="22" fill="#f3f4f6" stroke="#d1d5db"/>
    <text x="438" y="228" fill="#374151">testnet_rehearsal</text>
    <rect x="600" y="200" width="140" height="44" rx="22" fill="#f3f4f6" stroke="#d1d5db"/>
    <text x="645" y="228" fill="#374151">paused</text>
    <rect x="760" y="200" width="140" height="44" rx="22" fill="#f3f4f6" stroke="#d1d5db"/>
    <text x="805" y="228" fill="#374151">stopped</text>
    <rect x="920" y="200" width="140" height="44" rx="22" fill="#f3f4f6" stroke="#d1d5db"/>
    <text x="948" y="228" fill="#374151">flattening</text>
    <rect x="1080" y="200" width="190" height="44" rx="22" fill="#fee2e2" stroke="#ef4444"/>
    <text x="1112" y="228" fill="#991b1b">attention_required</text>
  </g>

  <rect x="40" y="322" width="420" height="480" rx="6" fill="#ffffff" stroke="#d1d5db"/>
  <text x="70" y="362" fill="#111827" font-family="Arial" font-size="18" font-weight="700">Normal Transitions</text>
  <rect x="70" y="396" width="340" height="58" rx="4" fill="#eff6ff" stroke="#60a5fa"/>
  <text x="92" y="431" fill="#1e3a8a" font-family="Arial" font-size="14" font-weight="700">Enter monitor for selected playbook</text>
  <rect x="70" y="478" width="340" height="58" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="92" y="513" fill="#92400e" font-family="Arial" font-size="14" font-weight="700">Prepare controlled testnet rehearsal</text>
  <rect x="70" y="560" width="340" height="58" rx="4" fill="#f3f4f6" stroke="#d1d5db"/>
  <text x="92" y="595" fill="#374151" font-family="Arial" font-size="14">Return to observe</text>
  <text x="70" y="680" fill="#6b7280" font-family="Arial" font-size="13">These transitions are not direct buttons.</text>
  <text x="70" y="706" fill="#6b7280" font-family="Arial" font-size="13">They create action cards first.</text>

  <rect x="510" y="322" width="420" height="480" rx="6" fill="#ffffff" stroke="#d1d5db"/>
  <text x="540" y="362" fill="#111827" font-family="Arial" font-size="18" font-weight="700">Fast Cut-Off Controls</text>
  <rect x="540" y="396" width="340" height="58" rx="4" fill="#fff7ed" stroke="#fb923c"/>
  <text x="562" y="431" fill="#9a3412" font-family="Arial" font-size="14" font-weight="700">Pause new entries</text>
  <rect x="540" y="478" width="340" height="58" rx="4" fill="#fee2e2" stroke="#ef4444"/>
  <text x="562" y="513" fill="#991b1b" font-family="Arial" font-size="14" font-weight="700">Emergency stop runtime</text>
  <rect x="540" y="560" width="340" height="58" rx="4" fill="#fee2e2" stroke="#ef4444"/>
  <text x="562" y="595" fill="#991b1b" font-family="Arial" font-size="14" font-weight="700">Emergency flatten</text>
  <text x="540" y="680" fill="#6b7280" font-family="Arial" font-size="13">Controls must be visible from Command Center.</text>
  <text x="540" y="706" fill="#6b7280" font-family="Arial" font-size="13">Flatten requires cancel/close evidence and final state read.</text>

  <rect x="980" y="322" width="420" height="480" rx="6" fill="#ffffff" stroke="#d1d5db"/>
  <text x="1010" y="362" fill="#111827" font-family="Arial" font-size="18" font-weight="700">Environment Boundary</text>
  <rect x="1010" y="396" width="340" height="72" rx="4" fill="#ecfdf5" stroke="#10b981"/>
  <text x="1032" y="426" fill="#065f46" font-family="Arial" font-size="14" font-weight="700">simulation</text>
  <text x="1032" y="450" fill="#065f46" font-family="Arial" font-size="13">local / mock / testnet / rehearsal</text>
  <rect x="1010" y="494" width="340" height="72" rx="4" fill="#fee2e2" stroke="#ef4444"/>
  <text x="1032" y="524" fill="#991b1b" font-family="Arial" font-size="14" font-weight="700">future live unavailable</text>
  <text x="1032" y="548" fill="#991b1b" font-family="Arial" font-size="13">modeled, disabled, future Owner authorization</text>
  <text x="1010" y="646" fill="#6b7280" font-family="Arial" font-size="13">This is a boundary display, not a switch.</text>
  <text x="1010" y="672" fill="#6b7280" font-family="Arial" font-size="13">Production authorization + security work required.</text>

  <rect x="40" y="842" width="1360" height="74" rx="6" fill="#ffffff" stroke="#d1d5db"/>
  <text x="70" y="886" fill="#111827" font-family="Arial" font-size="15" font-weight="700">Audit hard block: if state-changing audit write cannot be persisted, the action must not execute.</text>
</svg>
