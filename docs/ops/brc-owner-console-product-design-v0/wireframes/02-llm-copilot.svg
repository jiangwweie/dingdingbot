<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980">
  <rect width="1440" height="980" fill="#f6f7f9"/>
  <rect x="40" y="32" width="1360" height="70" rx="6" fill="#ffffff" stroke="#d1d5db"/>
  <text x="70" y="76" fill="#111827" font-family="Arial" font-size="22" font-weight="700">LLM Copilot / Intent Flow</text>
  <text x="1070" y="76" fill="#991b1b" font-family="Arial" font-size="14" font-weight="700">LLM cannot trade, confirm, or mutate directly</text>

  <rect x="40" y="132" width="500" height="780" rx="6" fill="#ffffff" stroke="#d1d5db"/>
  <text x="70" y="170" fill="#111827" font-family="Arial" font-size="18" font-weight="700">Owner Dialogue</text>
  <rect x="70" y="198" width="440" height="74" rx="8" fill="#eff6ff" stroke="#60a5fa"/>
  <text x="92" y="228" fill="#1e3a8a" font-family="Arial" font-size="14">Owner:</text>
  <text x="92" y="252" fill="#1f2937" font-family="Arial" font-size="14">Can we prepare a TF-001 testnet rehearsal?</text>

  <rect x="70" y="296" width="440" height="150" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="92" y="326" fill="#111827" font-family="Arial" font-size="14" font-weight="700">Assistant response structure</text>
  <text x="92" y="356" fill="#374151" font-family="Arial" font-size="13">1. Recognized intent</text>
  <text x="92" y="384" fill="#374151" font-family="Arial" font-size="13">2. Facts read</text>
  <text x="92" y="412" fill="#374151" font-family="Arial" font-size="13">3. Risk advice</text>
  <text x="92" y="440" fill="#374151" font-family="Arial" font-size="13">4. Proposed action card</text>

  <rect x="70" y="720" width="440" height="150" rx="6" fill="#ffffff" stroke="#d1d5db"/>
  <text x="92" y="754" fill="#111827" font-family="Arial" font-size="15" font-weight="700">Input Box</text>
  <rect x="92" y="778" width="396" height="58" rx="4" fill="#f3f4f6" stroke="#d1d5db"/>
  <text x="110" y="812" fill="#6b7280" font-family="Arial" font-size="13">Ask status, risk, market advice, or prepare action...</text>
  <rect x="350" y="846" width="138" height="34" rx="4" fill="#2563eb"/>
  <text x="386" y="868" fill="#ffffff" font-family="Arial" font-size="13" font-weight="700">Analyze</text>

  <rect x="580" y="132" width="380" height="780" rx="6" fill="#ffffff" stroke="#d1d5db"/>
  <text x="610" y="170" fill="#111827" font-family="Arial" font-size="18" font-weight="700">Controlled Fact Reads</text>
  <g font-family="Arial" font-size="13" fill="#374151">
    <rect x="610" y="204" width="320" height="54" rx="4" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="630" y="237">Read runtime state</text>
    <rect x="610" y="278" width="320" height="54" rx="4" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="630" y="311">Read account and risk summary</text>
    <rect x="610" y="352" width="320" height="54" rx="4" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="630" y="385">Read positions and orders</text>
    <rect x="610" y="426" width="320" height="54" rx="4" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="630" y="459">Read playbook registry</text>
    <rect x="610" y="500" width="320" height="54" rx="4" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="630" y="533">Read market state summary</text>
    <rect x="610" y="574" width="320" height="54" rx="4" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="630" y="607">Read audit and campaign evidence</text>
  </g>
  <rect x="610" y="704" width="320" height="112" rx="6" fill="#fee2e2" stroke="#ef4444"/>
  <text x="632" y="738" fill="#991b1b" font-family="Arial" font-size="14" font-weight="700">Forbidden</text>
  <text x="632" y="768" fill="#991b1b" font-family="Arial" font-size="13">No direct DB writes</text>
  <text x="632" y="794" fill="#991b1b" font-family="Arial" font-size="13">No direct orders or runtime mutation</text>

  <rect x="1000" y="132" width="400" height="780" rx="6" fill="#ffffff" stroke="#d1d5db"/>
  <text x="1030" y="170" fill="#111827" font-family="Arial" font-size="18" font-weight="700">Application Action Card Panel</text>
  <rect x="1030" y="204" width="340" height="470" rx="6" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="1054" y="238" fill="#111827" font-family="Arial" font-size="15" font-weight="700">Prepare TF-001 testnet_rehearsal</text>
  <text x="1054" y="278" fill="#374151" font-family="Arial" font-size="13">Intent: controlled_testnet_rehearsal</text>
  <text x="1054" y="306" fill="#374151" font-family="Arial" font-size="13">Environment: simulation</text>
  <text x="1054" y="334" fill="#374151" font-family="Arial" font-size="13">Exchange: Binance testnet</text>
  <text x="1054" y="362" fill="#374151" font-family="Arial" font-size="13">Authority: application_preflight</text>
  <text x="1054" y="390" fill="#374151" font-family="Arial" font-size="13">Snapshot/preflight/idempotency required</text>
  <text x="1054" y="432" fill="#92400e" font-family="Arial" font-size="13" font-weight="700">Warnings</text>
  <text x="1054" y="458" fill="#92400e" font-family="Arial" font-size="13">Strategy evidence is advisory, not a hard block</text>
  <text x="1054" y="500" fill="#991b1b" font-family="Arial" font-size="13" font-weight="700">Hard Blocks</text>
  <text x="1054" y="526" fill="#991b1b" font-family="Arial" font-size="13">Live requested while simulation: blocked</text>
  <text x="1054" y="568" fill="#111827" font-family="Arial" font-size="13" font-weight="700">Application Confirmation</text>
  <text x="1054" y="594" fill="#374151" font-family="Arial" font-size="13">Expires; stale cards cannot execute</text>
  <rect x="1030" y="704" width="160" height="42" rx="4" fill="#2563eb"/>
  <text x="1074" y="731" fill="#ffffff" font-family="Arial" font-size="13" font-weight="700">Confirm</text>
  <rect x="1210" y="704" width="160" height="42" rx="4" fill="#f3f4f6" stroke="#d1d5db"/>
  <text x="1260" y="731" fill="#374151" font-family="Arial" font-size="13" font-weight="700">Cancel</text>
  <text x="1030" y="800" fill="#6b7280" font-family="Arial" font-size="13">Confirm belongs to application panel,</text>
  <text x="1030" y="824" fill="#6b7280" font-family="Arial" font-size="13">not to the LLM chat response.</text>
</svg>
