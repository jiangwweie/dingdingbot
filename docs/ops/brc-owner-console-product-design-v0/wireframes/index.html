<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BRC Owner Console Wireframes v0</title>
    <style>
      body {
        margin: 0;
        background: #f3f4f6;
        color: #111827;
        font-family: Arial, sans-serif;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 1;
        border-bottom: 1px solid #d1d5db;
        background: #ffffff;
        padding: 16px 24px;
      }
      h1 {
        margin: 0;
        font-size: 20px;
      }
      p {
        margin: 6px 0 0;
        color: #4b5563;
        font-size: 13px;
      }
      main {
        display: grid;
        gap: 24px;
        padding: 24px;
      }
      section {
        border: 1px solid #d1d5db;
        border-radius: 8px;
        background: #ffffff;
        overflow: hidden;
      }
      h2 {
        margin: 0;
        border-bottom: 1px solid #e5e7eb;
        padding: 12px 16px;
        font-size: 14px;
      }
      img {
        display: block;
        width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>BRC Owner Console Wireframes v0</h1>
      <p>Low-fidelity SVG review gallery. Source files remain the SVGs in this folder.</p>
    </header>
    <main>
      <section>
        <h2>01 Command Center</h2>
        <img src="01-command-center.svg" alt="Command Center wireframe" />
      </section>
      <section>
        <h2>02 LLM Copilot</h2>
        <img src="02-llm-copilot.svg" alt="LLM Copilot wireframe" />
      </section>
      <section>
        <h2>03 Risk &amp; Account</h2>
        <img src="03-risk-account.svg" alt="Risk and Account wireframe" />
      </section>
      <section>
        <h2>04 Runtime Control</h2>
        <img src="04-runtime-control.svg" alt="Runtime Control wireframe" />
      </section>
    </main>
  </body>
</html>
