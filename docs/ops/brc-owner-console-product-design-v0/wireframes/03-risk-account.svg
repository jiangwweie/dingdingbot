<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980">
  <rect width="1440" height="980" fill="#f6f7f9"/>
  <rect x="40" y="32" width="1360" height="70" rx="6" fill="#ffffff" stroke="#d1d5db"/>
  <text x="70" y="76" fill="#111827" font-family="Arial" font-size="22" font-weight="700">Risk &amp; Account</text>
  <text x="1120" y="76" fill="#374151" font-family="Arial" font-size="14">Risk explanation page, not parameter editor</text>

  <rect x="40" y="132" width="640" height="260" rx="6" fill="#ffffff" stroke="#d1d5db"/>
  <text x="70" y="170" fill="#111827" font-family="Arial" font-size="18" font-weight="700">Account State</text>
  <g font-family="Arial" font-size="14" fill="#374151">
    <text x="70" y="216">Environment: simulation / Binance testnet</text>
    <text x="70" y="252">Equity: read-only value or unavailable</text>
    <text x="70" y="288">Available margin: read-only value or unavailable</text>
    <text x="70" y="324">Open exposure: BTC / ETH summary</text>
    <text x="70" y="360">Real-account impact: none in v0</text>
  </g>

  <rect x="720" y="132" width="680" height="260" rx="6" fill="#ffffff" stroke="#d1d5db"/>
  <text x="750" y="170" fill="#111827" font-family="Arial" font-size="18" font-weight="700">Risk Decision / Campaign Bucket</text>
  <g font-family="Arial" font-size="14" fill="#374151">
    <text x="750" y="216">Risk Decision: ALLOW_READ / ATTENTION_REQUIRED</text>
    <text x="750" y="252">Max attempts: 2</text>
    <text x="750" y="288">Max simultaneous positions: 1</text>
    <text x="750" y="324">Loss lock: active / inactive</text>
    <text x="750" y="360">Profit protect: active / inactive</text>
  </g>

  <rect x="40" y="428" width="420" height="380" rx="6" fill="#ffffff" stroke="#d1d5db"/>
  <text x="70" y="466" fill="#111827" font-family="Arial" font-size="18" font-weight="700">Pre-Trade Risk Checks</text>
  <g font-family="Arial" font-size="14">
    <rect x="70" y="500" width="340" height="38" rx="4" fill="#ecfdf5" stroke="#10b981"/>
    <text x="92" y="525" fill="#065f46">Environment proves non-production</text>
    <rect x="70" y="552" width="340" height="38" rx="4" fill="#ecfdf5" stroke="#10b981"/>
    <text x="92" y="577" fill="#065f46">Audit persistence writable</text>
    <rect x="70" y="604" width="340" height="38" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="92" y="629" fill="#92400e">Flatness needs latest proof</text>
    <rect x="70" y="656" width="340" height="38" rx="4" fill="#ecfdf5" stroke="#10b981"/>
    <text x="92" y="681" fill="#065f46">Cut-off controls available</text>
    <rect x="70" y="708" width="340" height="38" rx="4" fill="#fee2e2" stroke="#ef4444"/>
    <text x="92" y="733" fill="#991b1b">Live/mainnet blocked</text>
  </g>

  <rect x="500" y="428" width="420" height="380" rx="6" fill="#ffffff" stroke="#d1d5db"/>
  <text x="530" y="466" fill="#111827" font-family="Arial" font-size="18" font-weight="700">Exposure &amp; Orders / Flatness Proof</text>
  <line x1="530" y1="500" x2="880" y2="500" stroke="#e5e7eb"/>
  <g font-family="Arial" font-size="14" fill="#374151">
    <text x="530" y="538">BTCUSDT position: flat / active</text>
    <text x="530" y="574">BTCUSDT open orders: 0 / n</text>
    <text x="530" y="626">ETHUSDT position: flat / active</text>
    <text x="530" y="662">ETHUSDT open orders: 0 / n</text>
    <text x="530" y="724">Order source: workflow / runtime / external / unknown</text>
    <text x="530" y="760">Unknown active order -> attention_required.</text>
  </g>

  <rect x="960" y="428" width="440" height="380" rx="6" fill="#ffffff" stroke="#d1d5db"/>
  <text x="990" y="466" fill="#111827" font-family="Arial" font-size="18" font-weight="700">Risk Advice</text>
  <g font-family="Arial" font-size="14" fill="#374151">
    <text x="990" y="520">Account risk: budget and loss spillover</text>
    <text x="990" y="558">Position risk: duplicate exposure or stale orders</text>
    <text x="990" y="596">Execution risk: close/cancel/fill uncertainty</text>
    <text x="990" y="634">Strategy risk: weak evidence or bad regime</text>
    <text x="990" y="672">Market risk: volatility, trend/range uncertainty</text>
    <text x="990" y="710">Behavior risk: loss-chasing or overconfidence</text>
    <text x="990" y="748">System risk: runtime, exchange, audit health</text>
  </g>

  <rect x="40" y="846" width="1360" height="72" rx="6" fill="#fff7ed" stroke="#fb923c"/>
  <text x="70" y="890" fill="#9a3412" font-family="Arial" font-size="15" font-weight="700">Future parameter changes require separate workflow, confirmation, and audit. This page is read-only in v0.</text>
</svg>
