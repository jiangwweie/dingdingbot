repos:
  - repo: local
    hooks:
      # Python 代码格式化
      - id: black
        name: black
        entry: black
        language: python
        types: [python]
        args: [--line-length=100]

      # 代码风格检查
      - id: flake8
        name: flake8
        entry: flake8
        language: python
        types: [python]
        args: [--max-line-length=100, --ignore=E501,W503]

      # 类型检查
      - id: mypy
        name: mypy
        entry: mypy
        language: python
        types: [python]
        args: [--ignore-missing-imports, --no-strict-optional]

      # 单元测试
      - id: pytest
        name: pytest
        entry: pytest tests/unit/ -v --tb=short
        language: python
        types: [python]
        pass_filenames: false

      # float 污染检查
      - id: check-float
        name: check-float
        entry: python3 scripts/check_float.py
        language: python
        types: [python]
        pass_filenames: false

      # Decimal quantize 检查
      - id: check-quantize
        name: check-quantize
        entry: python3 scripts/check_quantize.py
        language: python
        types: [python]
        pass_filenames: false
