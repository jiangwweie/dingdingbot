# 盯盘狗 🐶 前端独立部署
# Usage: docker compose -f docker-compose.frontend.yml up -d
# Logs:   docker compose -f docker-compose.frontend.yml logs -f frontend
#
# 前端可独立于后端+数据库单独部署，只需确保 nginx 代理指向后端地址。
# 典型场景：
#   1. 后端+PG 在服务器 A，前端在服务器 B
#   2. 本地开发前端，连接远程后端
#   3. 多前端实例指向同一后端
#
# 自定义后端地址：
#   1. 修改 docker/nginx.conf 中的 proxy_pass 目标
#   2. 或挂载自定义配置: - ./nginx.conf:/etc/nginx/conf.d/default.conf

services:
  frontend:
    build:
      context: ../gemimi-web-front
      dockerfile: Dockerfile
    container_name: dingdingbot-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    volumes:
      # 挂载 nginx 配置（覆盖镜像内默认配置）
      # 修改此文件中的 proxy_pass 即可切换后端地址
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      # 允许通过 host.docker.internal 访问宿主机上的后端
      - "host.docker.internal:host-gateway"
    networks:
      - dingdingbot-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  dingdingbot-net:
    external: true
