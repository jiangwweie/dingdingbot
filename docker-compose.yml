version: '3.8'

services:
  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: monitor-dog-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Config files (read-only from host)
      - ./config:/app/config:ro
      # Database persistence
      - ./data:/app/data
      # Logs persistence
      - ./logs:/app/logs
    environment:
      - TZ=Asia/Shanghai
      - PYTHONPATH=/app
      # Database URL (SQLite for development)
      - DATABASE_URL=sqlite+aiosqlite:///./data/v3_dev.db
      # Set to 'true' to enable SQL query logging
      - SQL_ECHO=false
    networks:
      - monitor-dog-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s  # Extended for Alembic migrations

  # PostgreSQL Service (Optional - for production testing)
  # Uncomment to use PostgreSQL instead of SQLite
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: monitor-dog-postgres
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: v3
  #     POSTGRES_PASSWORD: v3_password
  #     POSTGRES_DB: v3_prod
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - monitor-dog-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U v3"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # Frontend Web Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: monitor-dog-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - monitor-dog-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  monitor-dog-network:
    driver: bridge

volumes:
  config:
  data:
  logs:
  # postgres_data:
