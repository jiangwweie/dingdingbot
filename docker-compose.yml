version: '3.8'

services:
  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: monitor-dog-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Config files (read-only from host)
      - ./config:/app/config:ro
      # Database persistence
      - ./data:/app/data
      # Logs persistence
      - ./logs:/app/logs
    environment:
      - TZ=Asia/Shanghai
      - PYTHONPATH=/app
    networks:
      - monitor-dog-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend Web Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: monitor-dog-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - monitor-dog-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  monitor-dog-network:
    driver: bridge

volumes:
  config:
  data:
  logs:
