version: '3.8'

services:
  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: monitor-dog-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Config files - 外部挂载（可写，支持前端配置更新）
      - /usr/local/monitorDog/config/user-prod.yaml:/app/config/user.yaml
      - /usr/local/monitorDog/config/core.yaml:/app/config/core.yaml:ro
      # Database persistence - 外部挂载
      - /usr/local/monitorDog/data/signals-prod.db:/app/data/signals.db
      # Logs persistence - 外部挂载
      - /usr/local/monitorDog/logs:/app/logs
    environment:
      - TZ=Asia/Shanghai
      - PYTHONPATH=/app
    networks:
      - monitor-dog-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend Web Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: monitor-dog-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - monitor-dog-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  monitor-dog-network:
    driver: bridge
