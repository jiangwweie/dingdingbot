# Valid core configuration for testing
core_symbols:
  - BTC/USDT:USDT
  - ETH/USDT:USDT
  - SOL/USDT:USDT
  - BNB/USDT:USDT

pinbar_defaults:
  min_wick_ratio: 0.6
  max_body_ratio: 0.3
  body_position_tolerance: 0.1

ema:
  period: 60

mtf_ema_period: 60

mtf_mapping:
  "15m": "1h"
  "1h": "4h"
  "4h": "1d"
  "1d": "1w"

warmup:
  history_bars: 100

signal_pipeline:
  cooldown_seconds: 14400
  queue:
    batch_size: 10
    flush_interval: 5.0
    max_queue_size: 1000

atr:
  enabled: true
  period: 14
  min_ratio: 0.5
