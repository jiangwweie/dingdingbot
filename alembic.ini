# Alembic Configuration
# v3.0 Database Migrations

[alembic]
# 迁移脚本目录
script_location = migrations

# 模板文件
file_template = %%(year)d-%%(month).2d-%%(day).2d-%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# 时区
timezone = UTC

# SQLAlchemy URL（用于自动生成迁移）
# 使用同步 SQLite 驱动运行迁移
sqlalchemy.url = sqlite:///./data/v3_dev.db

# 版本表名
version_table = alembic_version

# 版本表 Schema（PostgreSQL 用）
version_table_schema = public

[post_write_hooks]
# 写入后钩子（代码格式化）
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -q

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
