  interval_seconds: 60               # 轮询间隔 60 秒

# ------------------------------------------------------------
# 通知渠道
# ------------------------------------------------------------
notification:
  channels:
    - type: feishu                   # 飞书机器人
      webhook_url: https://open.feishu.cn/open-apis/bot/v2/hook/14797747-0403-4455-a7fe-f6b69cf0ef04

# ------------------------------------------------------------
# MTF 配置（全局覆盖）
# ------------------------------------------------------------
mtf_ema_period: 60                   # MTF 趋势计算使用的 EMA 周期
mtf_mapping:                         # MTF 周期映射（低周期 → 高周期）
  15m: 1h
  1h: 4h
  4h: 1d
  1d: 1w
