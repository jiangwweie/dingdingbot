# ------------------------------------------------------------
# 时间周期
# ------------------------------------------------------------
# 可选值：15m, 1h, 4h, 1d, 1w
timeframes:
  - 15m
  - 1h

# ------------------------------------------------------------
# 激活的策略列表
# ------------------------------------------------------------
# 说明：支持多策略并行，每个策略独立运行
active_strategies:
  - id: 1774704112251-34o2n0880    # 策略 ID（已持久化到数据库）
    name: 01pinbar-ema60            # 策略名称
    is_global: true                 # true=应用于所有币种，false=仅 apply_to 列表
    apply_to: []                    # 作用域（空且 is_global=true 时应用于所有）

    # 策略逻辑树（Phase K 新格式）
    logic_tree:
      gate: AND                     # 逻辑门：AND=所有条件满足，OR=任一条件满足
      children:
        - type: trigger             # 触发器节点
          id: 1774704112251-371biqkmt
          config:
            id: 1774704112251-371biqkmt
            type: pinbar            # Pinbar 形态策略
            enabled: true
            params:
              min_wick_ratio: 0.5     # 影线占比最低 50%（原 60% → 放宽）
              max_body_ratio: 0.35    # 实体占比最高 35%（原 30% → 放宽）
              body_position_tolerance: 0.3  # 实体位置容差 30%（原 10% → 允许居中）

        - type: filter              # 过滤器节点 1: MTF 多周期趋势确认
          id: 1774704138927-5laz0wsx9
          config:
            id: 1774704138927-5laz0wsx9
            type: mtf
            enabled: true
            params: {}

        - type: filter              # 过滤器节点 2: EMA 趋势过滤
          id: 1774706995880-9bbpdel39
          config:
            id: 1774706995880-9bbpdel39
            type: ema
            enabled: true
            params: {}

    # 触发器组合逻辑（遗留字段，兼容旧格式）
    trigger_logic: OR

    # 触发器定义（遗留字段，兼容旧格式）
    triggers:
      - id: 1774704112251-371biqkmt
        type: pinbar
        enabled: true
        params:
          min_wick_ratio: 0.6
          max_body_ratio: 0.3
          body_position_tolerance: 0.1

    # 触发器定义（遗留字段，兼容旧格式）
    trigger:
      id: 1774704112251-371biqkmt
      type: pinbar
      enabled: true
      params:
        min_wick_ratio: 0.5
        max_body_ratio: 0.35
        body_position_tolerance: 0.3

    # 过滤器链（遗留字段，兼容旧格式）
    filters:
      - id: 1774704138927-5laz0wsx9
        type: mtf
        enabled: true
        params: {}
      - id: 1774706995880-9bbpdel39
        type: ema
        enabled: true
        params: {}

    # 过滤器组合逻辑（遗留字段，兼容旧格式）
    filter_logic: AND

# ------------------------------------------------------------
# 遗留策略配置（已废弃，仅兼容旧版本）
# ------------------------------------------------------------
strategy: null

# ------------------------------------------------------------
# 风控配置
# ------------------------------------------------------------
risk:
  max_loss_percent: '0.02'           # 单笔最大亏损 2%（基于可用余额）
  max_leverage: 20                  # 最大杠杆倍数
  max_total_exposure: '0.8'          # 最大总仓位占用 80%

# ------------------------------------------------------------
